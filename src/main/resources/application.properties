# =============================================================================
# Serve Volunteering Service - Unified Configuration
# =============================================================================

# --- Server ---
server.port=${SERVER_PORT:9090}
server.servlet.context-path=/api/v1/serve-volunteering/
server.error.include-exception=${INCLUDE_EXCEPTION:false}
server.error.include-stacktrace=${INCLUDE_STACKTRACE:never}
server.compression.enabled=false

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/serve}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:20000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1200000}

# --- JPA ---
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- Keycloak / OAuth2 Resource Server ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/sunbird-serve}

# --- Keycloak Admin API (for role assignment) ---
keycloak.admin.url=${KEYCLOAK_URL:http://localhost:8080}
keycloak.admin.realm=${KEYCLOAK_REALM:sunbird-serve}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:serve-backend}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}

# --- External Services ---
rc.service.base-url=${RC_SERVICE_URL:http://localhost:8081/api/v1/}

# --- CORS ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://serve-v1.evean.net,http://serve-v1.evean.net,http://localhost:3000,http://localhost:4173,http://localhost:5173}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}

# --- Email ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Logging ---
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.sunbird.serve.volunteering=${LOG_LEVEL_APP:INFO}
logging.level.reactor.netty.http.client.HttpClient=${LOG_LEVEL_HTTP_CLIENT:DEBUG}
logging.pattern.console=%d [%level] %c{1.} [%t] %m%n
logging.file.name=${LOG_FILE:appLog.log}
logging.pattern.file=%d [%level] %c{1.} [%t] %m%n

# --- Swagger / OpenAPI ---
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.oauth.client-id=serve-ui
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true

# --- User Cache ---
user.cache.refresh-interval-ms=${USER_CACHE_REFRESH_MS:60000}
